<!doctype html>
<html lang="zh-Hant">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title id="t-title">課程帳號 / 成績系統</title>
<body style="font-family:system-ui;max-width:640px;margin:3rem auto;padding:0 1rem;line-height:1.6">
  <p style="text-align:right;font-size:.9em"><a href="#" id="lang-zh">中文</a> | <a href="#" id="lang-en">English</a></p>
  <h1 id="t-h1"></h1>
  <p id="t-intro"></p>
  <ul>
    <li id="t-li1"></li>
    <li id="t-li2"></li>
    <li id="t-li3"></li>
  </ul>
  <p><a id="start" style="display:inline-block;padding:.7rem 1.4rem;background:#0b5;color:#fff;border-radius:8px;text-decoration:none"></a></p>
  <script>
    // 部署後把這裡換成你的 Worker 網址
    const WORKER_BASE = "https://maccount-api.skhuang.workers.dev";
    const STR = {
      zh: {
        title: "課程帳號 / 成績系統",
        h1: "課程帳號 / 成績系統",
        intro: "用你的 NYCU 帳號 (id.nycu.edu.tw) 登入。登入後可以：",
        li1: "綁定你的 GitHub 帳號（作業評分用）",
        li2: "查詢你的成績",
        li3: "具管理權限者可使用管理功能",
        btn: "用 NYCU 帳號登入 →",
      },
      en: {
        title: "Course Account / Grades",
        h1: "Course Account / Grades",
        intro: "Sign in with your NYCU account (id.nycu.edu.tw). After signing in you can:",
        li1: "Bind your GitHub account (for grading)",
        li2: "Check your grades",
        li3: "Admins can use admin functions",
        btn: "Sign in with NYCU →",
      },
    };
    function getLang() {
      const q = new URLSearchParams(location.search).get("lang");
      if (q === "en" || q === "zh") { localStorage.setItem("lang", q); return q; }
      return localStorage.getItem("lang") === "en" ? "en" : "zh";
    }
    function render(lang) {
      const s = STR[lang];
      document.documentElement.lang = lang === "en" ? "en" : "zh-Hant";
      document.getElementById("t-title").textContent = s.title;
      document.getElementById("t-h1").textContent = s.h1;
      document.getElementById("t-intro").textContent = s.intro;
      document.getElementById("t-li1").textContent = s.li1;
      document.getElementById("t-li2").textContent = s.li2;
      document.getElementById("t-li3").textContent = s.li3;
      const a = document.getElementById("start");
      a.textContent = s.btn;
      // carry the choice into the Worker so the dashboard matches
      a.href = WORKER_BASE + "/auth/nycu/start?lang=" + lang;
    }
    function setLang(l) { localStorage.setItem("lang", l); render(l); }
    document.getElementById("lang-zh").onclick = (e) => { e.preventDefault(); setLang("zh"); };
    document.getElementById("lang-en").onclick = (e) => { e.preventDefault(); setLang("en"); };
    render(getLang());
  </script>
</body>
</html>
