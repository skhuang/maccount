name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Worker test configuration
        run: cp wrangler.toml.example wrangler.toml

      - name: Run tests
        run: npm test

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run UI and accessibility tests
        run: npm run test:ui
