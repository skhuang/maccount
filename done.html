<!doctype html>
<html lang="zh-Hant">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title id="t-title">結果</title>
<body style="font-family:system-ui;max-width:640px;margin:3rem auto;padding:0 1rem;line-height:1.6">
  <p style="text-align:right;font-size:.9em"><a href="#" id="lang-zh">中文</a> | <a href="#" id="lang-en">English</a></p>
  <h1 id="title">…</h1>
  <p id="msg"></p>
  <p><a href="./" id="home"></a></p>
  <script>
    const STR = {
      zh: {
        page: "結果",
        ok_title: "✅ 綁定成功",
        ok_msg: "你的 NYCU 與 GitHub 帳號已建立對應。",
        err_title: "⚠️ 未完成",
        already: "這個 GitHub 帳號已被其他 NYCU 帳號綁定，請聯絡管理員。",
        notbound: "這個帳號尚未綁定任何 NYCU 帳號。請先用 NYCU 帳號登入並完成綁定，之後才能用 GitHub／Google 登入。",
        denied: "授權未完成，請回首頁重試。",
        generic: "發生錯誤，請回首頁重試。",
        home: "回首頁",
      },
      en: {
        page: "Result",
        ok_title: "✅ Bound",
        ok_msg: "Your NYCU and GitHub accounts are now linked.",
        err_title: "⚠️ Not completed",
        already: "This GitHub account is already bound to another NYCU account — please contact an admin.",
        notbound: "This account isn't linked to any NYCU account yet. Sign in with NYCU and link it first, then you can use GitHub/Google to sign in.",
        denied: "Authorization was not completed; please return home and try again.",
        generic: "Something went wrong; please return home and try again.",
        home: "Home",
      },
    };
    const q = new URLSearchParams(location.search);
    function getLang() {
      const l = q.get("lang");
      if (l === "en" || l === "zh") { localStorage.setItem("lang", l); return l; }
      return localStorage.getItem("lang") === "en" ? "en" : "zh";
    }
    function render(lang) {
      const s = STR[lang];
      document.documentElement.lang = lang === "en" ? "en" : "zh-Hant";
      document.getElementById("t-title").textContent = s.page;
      document.getElementById("home").textContent = s.home;
      const title = document.getElementById("title");
      const msg = document.getElementById("msg");
      if (q.get("status") === "ok") {
        title.textContent = s.ok_title;
        msg.textContent = s.ok_msg;
      } else {
        title.textContent = s.err_title;
        const reason = q.get("reason");
        msg.textContent = reason === "github_already_bound" ? s.already
          : (reason === "github_not_bound" || reason === "google_not_bound") ? s.notbound
          : reason ? s.denied + " (" + reason + ")"
          : s.generic;
      }
    }
    function setLang(l) { localStorage.setItem("lang", l); render(l); }
    document.getElementById("lang-zh").onclick = (e) => { e.preventDefault(); setLang("zh"); };
    document.getElementById("lang-en").onclick = (e) => { e.preventDefault(); setLang("en"); };
    render(getLang());
  </script>
</body>
</html>
